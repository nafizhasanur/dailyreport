<!DOCTYPE html>
<html lang="bn" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinanceFlow • Personal Finance</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .glass { background: rgba(255,255,255,0.06); backdrop-filter: blur(12px); }
    .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .card-hover:hover { transform: translateY(-4px); }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen">

  <!-- Password Screen -->
  <div id="password-screen" class="fixed inset-0 bg-zinc-950 flex items-center justify-center z-50 px-4">
    <div class="glass p-8 md:p-10 rounded-3xl w-full max-w-md border border-zinc-700">
      <div class="text-center mb-8">
        <div class="w-16 h-16 mx-auto bg-gradient-to-br from-cyan-400 to-blue-500 rounded-2xl flex items-center justify-center text-3xl font-bold mb-4">FF</div>
        <h1 class="text-3xl font-semibold">FinanceFlow</h1>
        <p class="text-zinc-400 mt-2">Secure Finance Tracker</p>
      </div>
      <input id="password-input" type="password" placeholder="Enter Password" 
             class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-6 py-4 text-lg focus:outline-none focus:border-cyan-500 mb-6">
      <button onclick="checkPassword()" class="w-full bg-white text-black font-semibold py-4 rounded-2xl hover:bg-cyan-400">Unlock</button>
    </div>
  </div>

  <!-- Main App -->
  <div id="main-app" class="hidden max-w-7xl mx-auto p-4 md:p-8">
    <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
      <div class="flex items-center gap-4">
        <div class="w-10 h-10 bg-gradient-to-br from-cyan-400 to-blue-500 rounded-2xl flex items-center justify-center text-2xl font-bold">FF</div>
        <h1 class="text-3xl font-semibold">FinanceFlow</h1>
      </div>
      <div class="flex gap-2 bg-zinc-900 rounded-3xl p-1">
        <button onclick="showTab(0)" class="tab-btn px-6 py-3 rounded-3xl font-medium">Dashboard</button>
        <button onclick="showTab(1)" class="tab-btn px-6 py-3 rounded-3xl font-medium">Add Entry</button>
        <button onclick="showTab(2)" class="tab-btn px-6 py-3 rounded-3xl font-medium">Monthly</button>
      </div>
    </header>

    <!-- Add Entry Tab (সবচেয়ে গুরুত্বপূর্ণ) -->
    <div id="tab-1" class="tab-content">
      <div class="max-w-2xl mx-auto">
        <div class="glass p-8 rounded-3xl">
          <h2 class="text-2xl font-semibold mb-6">New Transaction</h2>
          <form id="entry-form" class="space-y-6">
            <div>
              <label class="block text-sm text-zinc-400 mb-2">Type</label>
              <select id="type" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4">
                <option value="Expense">Expense (খরচ)</option>
                <option value="Income">Income (আয়)</option>
                <option value="Savings">Savings (সঞ্চয়)</option>
              </select>
            </div>
            <div>
              <label class="block text-sm text-zinc-400 mb-2">Category</label>
              <input id="category" type="text" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4" placeholder="Food, Salary, etc.">
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-sm text-zinc-400 mb-2">Amount (৳)</label>
                <input id="amount" type="number" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4" required>
              </div>
              <div>
                <label class="block text-sm text-zinc-400 mb-2">Date</label>
                <input id="date" type="date" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4">
              </div>
            </div>
            <div>
              <label class="block text-sm text-zinc-400 mb-2">Description</label>
              <textarea id="description" rows="3" class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl px-5 py-4"></textarea>
            </div>
            <button type="submit" class="w-full bg-white hover:bg-cyan-400 text-black font-semibold py-4 rounded-3xl text-lg">Add Transaction</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbw6CHVetvzCei1PYcGhP0Uk3Ifj28tXNcfKOeKICtAUmZltZyAVLtztV3I_VPYHzN8tGg/exec';
    const PASSWORD = "123456";   // চাইলে পরিবর্তন করো

    function checkPassword() {
      if (document.getElementById('password-input').value === PASSWORD) {
        document.getElementById('password-screen').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        showTab(1);
      } else {
        alert("Wrong Password!");
      }
    }

    function showTab(n) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
      document.getElementById(`tab-${n}`).classList.remove('hidden');
    }

    // Form Submit
    document.getElementById('entry-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      const originalText = btn.innerHTML;
      btn.innerHTML = 'Adding...';
      btn.disabled = true;

      const data = {
        action: 'add',
        date: document.getElementById('date').value || new Date().toISOString().slice(0,10),
        type: document.getElementById('type').value,
        category: document.getElementById('category').value.trim(),
        amount: document.getElementById('amount').value,
        description: document.getElementById('description').value.trim()
      };

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify(data),
          headers: { 'Content-Type': 'application/json' }
        });

        const result = await response.json();

        if (result.success) {
          alert('✅ Transaction Added Successfully!');
          e.target.reset();
          document.getElementById('date').valueAsDate = new Date();
        } else {
          alert('❌ ' + (result.message || 'Something went wrong'));
        }
      } catch (err) {
        console.error(err);
        alert('❌ Failed to connect to Google Sheet.\n\nPlease check:\n1. Apps Script Redeploy করা হয়েছে কিনা\n2. Spreadsheet ID সঠিক আছে কিনা');
      } finally {
        btn.innerHTML = originalText;
        btn.disabled = false;
      }
    });

    // Initialize
    document.getElementById('date').valueAsDate = new Date();
    showTab(1);
  </script>
</body>
</html>
